<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Mubasshir Tijjani Yusuf</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, Helvetica, sans-serif;
            background:#f4f4f4;
            color:#333;
        }

        header{
            background:#0d6efd;
            color:#fff;
            text-align:center;
            padding:25px;
        }

        nav{
            display:flex;
            justify-content:center;
            flex-wrap:wrap;
            background:#222;
        }

        nav a{
            color:#fff;
            text-decoration:none;
            padding:15px 20px;
            transition:.3s;
        }

        nav a:hover{
            background:#0d6efd;
        }

        .container{
            width:90%;
            max-width:1200px;
            margin:40px auto;
        }

        h2{
            text-align:center;
            color:#0d6efd;
            margin-bottom:30px;
        }

        .gallery{
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
            gap:20px;
        }

        .gallery img{
            width:100%;
            height:220px;
            object-fit:cover;
            border-radius:10px;
            box-shadow:0 4px 8px rgba(0,0,0,.2);
            transition:.3s;
        }

        .gallery img:hover{
            transform:scale(1.05);
        }

        footer{
            background:#222;
            color:#fff;
            text-align:center;
            padding:20px;
            margin-top:40px;
        }

        @media(max-width:768px){

            nav{
                flex-direction:column;
            }

            nav a{
                text-align:center;
            }

        }

    </style>
</head>
<body>

<header>
    <h1>Mubasshir Tijjani Yusuf</h1>
    <p>Software Engineering Student</p>
</header>

    <a href="learning.html">Learning Journey</a>
    <a href="certificate.html">Certificate</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">

    <h2>My Gallery</h2>

    <div class="gallery">

        <img src="images/profile.jpg" alt="My Profile">

        <img src="images/project1.jpg" alt="Project 1">

        <img src="images/project2.jpg" alt="Project 2">

        <img src="images/project3.jpg" alt="Project 3">

        <img src="images/certificate.jpg" alt="Certificate">

        <img src="images/coding.jpg" alt="Coding Session">

    </div>

</div>

</html>
