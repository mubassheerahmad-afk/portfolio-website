<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | Mubasshir Tijjani Yusuf</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f4f4;
    color:#333;
}

header{
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:20px;
}

nav{
    background:#222;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
}

nav a{
    color:white;
    text-decoration:none;
    padding:15px 20px;
}

nav a:hover{
    background:#0d6efd;
}

.container{
    max-width:1100px;
    margin:40px auto;
    padding:20px;
}

h2{
    text-align:center;
    color:#0d6efd;
    margin-bottom:25px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
}

.media{
    background:white;
    margin-top:40px;
    padding:25px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.media h3{
    color:#0d6efd;
    margin-bottom:15px;
}

audio,
video{
    width:100%;
    margin-top:10px;
}

footer{
    background:#222;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}

@media(max-width:768px){
    nav{
        flex-direction:column;
    }

    nav a{
        text-align:center;
    }

    .container{
        margin:20px;
    }
}
</style>

</head>
<body>

<header>
    <h1>Mubasshir Tijjani Yusuf</h1>
    <p>Software Engineering Student</p>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="skills.html">Skills</a>
    <a href="services.html">Services</a>
    <a href="projects.html">Projects</a>
    <a href="contact.html">Contact</a>
    <a href="learning.html">Learning</a>
    <a href="gallery.html">Gallery</a>
    <a href="certificate.html">Certificate</a>
</nav>

<div class="container">

<h2>My Gallery</h2>

<div class="gallery">

    <img src="photo1.png" alt="Gallery Image 1">

    <img src="photo2.png" alt="Gallery Image 2">

    <img src="photo3.png" alt="Gallery Image 3">
</div>

<div class="media">

<h3>Audio</h3>

<audio controls>
    <source src="music.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
</audio>

</div>

<div class="media">

<h3>Video</h3>

<video controls>
    <source src="video.mp4" type="video/mp4">
    Your browser does not support the video tag.
</video>

</div>

</div>

<footer>
<p>&copy; 2026 Mubasshir Tijjani Yusuf. All Rights Reserved.</p>
</footer>

</body>
</html>
