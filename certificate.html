  <title>Certificates | Mubasshir Tijjani Yusuf</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, Helvetica, sans-serif;
      background:#f4f4f4;
      color:#333;
      line-height:1.6;
    }

    header{
      background:#0d6efd;
      color:white;
      text-align:center;
      padding:20px;
    }

    header h2{
      color: white;
      margin-top: 10px;
    }

    nav{
      background:#222;
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
    }

    nav a{
      color:white;
      text-decoration:none;
      padding:15px 20px;
    }

    nav a:hover{
      background:#0d6efd;
    }

    .container{
      max-width:800px;
      margin:40px auto;
      padding:20px;
      background:white;
      border-radius:10px;
      box-shadow:0 2px 10px rgba(0,0,0,.1);
    }

    .container h2{
      text-align:center;
      margin-bottom:30px;
      color:#0d6efd;
    }

    /* Single Certificate Display Style */
    .fcc-certificate-showcase {
      border: 2px solid #0a0a23; /* freeCodeCamp corporate dark brown/black */
      border-radius: 8px;
      background: #fff;
      padding: 20px;
      text-align: center;
    }

    .fcc-badge {
      display: inline-block;
      background: #0a0a23;
      color: #ffffff;
      padding: 6px 15px;
      font-weight: bold;
      font-size: 14px;
      border-radius: 4px;
      margin-bottom: 20px;
    }

    .certificate-img-container {
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 4px;
      max-width: 100%;
      height: auto;
      margin: 0 auto 20px auto;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }

    .certificate-img-container img {
      width: 100%;
      height: auto;
      display: block;
    }

    .certificate-title {
      font-size: 24px;
      color: #0a0a23;
      margin-bottom: 5px;
    }

    .certificate-issuer {
      font-size: 16px;
      color: #28a745;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .certificate-date {
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
    }

    /* Verification Action Button */
    .verify-btn {
      display: inline-block;
      background: #0a0a23;
      color: #fff;
      text-decoration: none;
      padding: 12px 30px;
      border-radius: 5px;
      font-size: 16px;
      font-weight: bold;
      transition: background 0.2s, transform 0.2s;
    }

    .verify-btn:hover {
      background: #24243e;
      transform: translateY(-2px);
    }

    footer{
      text-align:center;
      padding:20px;
      background:#222;
      color:white;
      margin-top:40px;
    }

    @media(max-width:768px){
      nav{
        flex-direction:column;
      }

      nav a{
        text-align:center;
      }

      .container{
        margin:20px;
      }
      
      .certificate-title {
        font-size: 20px;
      }
    }
  </style>
</head>
