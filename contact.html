<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Mubasshir Tijjani Yusuf</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, Helvetica, sans-serif;
            background:#f4f4f4;
            color:#333;
        }

        header{
            background:#0d6efd;
            color:#fff;
            text-align:center;
            padding:25px;
        }

        nav{
            display:flex;
            justify-content:center;
            flex-wrap:wrap;
            background:#222;
        }

        nav a{
            color:#fff;
            text-decoration:none;
            padding:15px 20px;
        }

        nav a:hover{
            background:#0d6efd;
        }

        .container{
            max-width:900px;
            margin:40px auto;
            background:#fff;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.1);
        }

        h2{
            text-align:center;
            color:#0d6efd;
            margin-bottom:20px;
        }

        .contact-info{
            margin-bottom:30px;
        }

        .contact-info p{
            margin:10px 0;
            font-size:18px;
        }

        form{
            display:flex;
            flex-direction:column;
        }

        input, textarea{
            padding:12px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        textarea{
            resize:vertical;
        }

        button{
            background:#0d6efd;
            color:#fff;
            border:none;
            padding:12px;
            font-size:16px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#084298;
        }

        footer{
            background:#222;
            color:#fff;
            text-align:center;
            padding:20px;
            margin-top:40px;
        }

        @media(max-width:768px){
            nav{
                flex-direction:column;
            }

            nav a{
                text-align:center;
            }

            .container{
                margin:20px;
            }
        }
    </style>
</head>

<header>
    <h1>Mubasshir Tijjani Yusuf</h1>

</header>

<nav>

    <h2>Contact Me</h2>

    <div class="contact-info">
        <p><strong>Name:</strong> Mubasshir Tijjani Yusuf</p>
        <p><strong>Email:</strong> mubassheerahmad@.gmailcom</p>
        <p><strong>Phone:</strong> +234-90-70-60-84-03</p>
        <p><strong>Location:</strong> Nigeria</p>
    </div>

    <form action="#" method="post">

        <input
            type="text"
            name="name"
            placeholder="Enter your full name"
            required>

        <input
            type="email"
            name="email"
            placeholder="Enter your email address"
            required>

        <input
            type="text"
            name="subject"
            placeholder="Subject"
            required>

        <textarea
            name="message"
            rows="6"
            placeholder="Write your message here..."
            required></textarea>

        <button type="submit">Send Message</button>

    </form>

</div>
